name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: koroneStrap-windows.exe
            exe: koroneStrap.exe
          - os: macos-13
            name: koroneStrap-macos-intel
            exe: koroneStrap
          - os: macos-14
            name: koroneStrap-macos-arm
            exe: koroneStrap
          - os: ubuntu-latest
            name: koroneStrap-linux-intel
            exe: koroneStrap
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install colorama pyinstaller
      - name: Build
        run: |
          pyinstaller --onefile --name koroneStrap koroneStrap.py
          mv dist/${{ matrix.exe }} dist/${{ matrix.name }}
        shell: bash
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
